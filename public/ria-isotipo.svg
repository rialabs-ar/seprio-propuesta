<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Soft corona hint -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.14"/>
  <circle cx="50" cy="50" r="41" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.22"/>
  <!-- Main corona ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#ffffff" stroke-width="4.5" opacity="0.95"/>
  <!-- Inner limb hint -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.5"/>
  <!-- Moon disc: transparent so dark background shows through -->
</svg>
